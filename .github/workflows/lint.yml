# .github/workflows/lint.yml
name: Lint

on:
  push:
    branches: [master]
  pull_request:

jobs:
  zsh-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Install zshellcheck
        run: curl -fsSL https://raw.githubusercontent.com/afadesigns/zshellcheck/main/install.sh | bash

      - name: zshellcheck
        run: zshellcheck -format sarif -severity warning .zshrc .zshenv > zshellcheck.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: zshellcheck.sarif

      - name: shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          severity: warning
          additional_files: '.zshrc .zshenv'
