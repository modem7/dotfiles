# .github/workflows/lint.yml
name: Lint

on:
  push:
    branches: [master]
  pull_request:

jobs:
  zsh-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: zshellcheck
        uses: afadesigns/zshellcheck@v1.7.0
        with:
          args: -format sarif -severity warning .zshrc .zshenv

      - name: Capture zshellcheck SARIF
        run: zshellcheck -format sarif -severity warning .zshrc .zshenv > zshellcheck.sarif
        if: always()

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: zshellcheck.sarif
